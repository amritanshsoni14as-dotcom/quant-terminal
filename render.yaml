# Render Blueprint — deploys the FastAPI backend (free tier).
# In Render: New + → Blueprint → connect your GitHub repo → it reads this file.
# Set the secret env vars (DATABASE_URL, GROQ_API_KEY) in the dashboard.
services:
  - type: web
    name: rainmumbai-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"          # 3.12 has the widest wheel coverage on Render
      - key: DATABASE_URL
        sync: false              # paste your Neon/Supabase Postgres URL in the dashboard
      - key: GROQ_API_KEY
        sync: false              # paste your free Groq key in the dashboard
      - key: CORS_ORIGINS
        sync: false              # set to your Vercel URL, e.g. https://your-app.vercel.app
      - key: BACKFILL_YEARS
        value: "25"
