services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: rain
      POSTGRES_PASSWORD: rain
      POSTGRES_DB: rainmumbai
    ports:
      - "5432:5432"
    volumes:
      - rain_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  rain_pgdata:
